{% extends "layout.html" %}
{% block title %}Mapa{% endblock %}
{% block page_title %}Mapa de Zonas — 14 Mar 2026{% endblock %}

{% block content %}
<script>
const _ASIGNACIONES = {{ asignaciones | tojson }};
const _ZONAS_DATA   = {{ zonas_data   | tojson }};
</script>

<div x-data="mapaPage()" x-init="init()" class="space-y-4">

  <!-- Header -->
  <div class="flex flex-wrap items-center justify-between gap-3">
    <div>
      <h2 class="text-lg font-bold text-white">Plano interactivo del estadio</h2>
      <p class="text-xs text-slate-500 mt-0.5">Haz clic en una zona o subsector para ver las asignaciones del día</p>
    </div>
    <span class="chip bg-cyan-500/10 text-cyan-300 border border-cyan-500/20 text-xs px-3 py-1.5 rounded-full">
      📅 Sábado 14 de marzo de 2026
    </span>
  </div>

  <!-- Legend -->
  <div class="flex flex-wrap gap-2 text-[11px]">
    <template x-for="z in zonasList" :key="z.id">
      <button @click="selectZona(z.id)"
              :class="activeZona===z.id
                ? 'ring-2 ring-white scale-105 shadow-lg'
                : 'opacity-80 hover:opacity-100 hover:scale-105'"
              class="flex items-center gap-1.5 px-2.5 py-1 rounded-full font-semibold transition-all duration-150"
              :style="`background:${z.color}22; border:1.5px solid ${z.color}; color:${z.color}`">
        <span class="w-2 h-2 rounded-full inline-block" :style="`background:${z.color}`"></span>
        <span x-text="z.label"></span>
      </button>
    </template>
  </div>

  <!-- Map + panel layout -->
  <div class="flex flex-col xl:flex-row gap-4">

    <!-- SVG Map card -->
    <div class="flex-1 bg-slate-900/80 border border-slate-700/60 rounded-2xl p-4 overflow-hidden card-glow">
      <svg id="estadio-svg" viewBox="-80 0 920 960" class="w-full h-auto max-h-[90vh]"
           xmlns="http://www.w3.org/2000/svg" style="background:#0a0f1e;">

        <defs>
          <filter id="dot-shadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="1" stdDeviation="3" flood-opacity="0.6"/>
          </filter>
        </defs>

        <!-- ══════════════════════════════════════════════════════════
        <!-- ═══════════════════════════════════════════════
        <!-- ═══════════════════════════════════════════════
             STADIUM STRUCTURE  (portrait: 760 x 960)
             Center: 380, 490
             Outer grandstand: rx=330 ry=415
             Inner concourse:  rx=210 ry=260
             Inner field oval: rx=155 ry=195
        ════════════════════════════════════════════════ -->

        <!-- Outer stadium shell (extended to fit Zona 7 outer ring) -->
        <ellipse cx="380" cy="490" rx="435" ry="535" fill="#0b1120" stroke="#1e293b" stroke-width="2"/>
        <!-- Grandstand seating ring -->
        <ellipse cx="380" cy="490" rx="430" ry="530" fill="#0d1829" stroke="none"/>
        <!-- Inner grandstand boundary line -->
        <ellipse cx="380" cy="490" rx="330" ry="415" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.5"/>
        <!-- Concourse ring -->
        <ellipse cx="380" cy="490" rx="216" ry="266" fill="#101c30" stroke="#1e3050" stroke-width="1.5"/>
        <!-- Running track surface -->
        <ellipse cx="380" cy="490" rx="200" ry="250" fill="#0f1d10" stroke="#1a3a25" stroke-width="8" opacity="0.6"/>
        <!-- Inner field -->
        <ellipse cx="380" cy="490" rx="160" ry="200" fill="#0e1e0e" stroke="#1e3a1e" stroke-width="2"/>

        <!-- Platform blocks (Zona 5 — center of field) -->
        <rect x="280" y="440" width="75" height="110" rx="5" fill="#1a3a1a" stroke="#2d5c2d" stroke-width="1.5"/>

        <!-- ═══════════════════════════════════════════════
             ZONE COLORED ARCS  (full 360° coverage)
             Center (380,490) | Outer rx=330 ry=415 | Inner rx=216 ry=266
             Going CW from upper-left:
               Z-1 (red)     205° → 295°  (upper-left)
               Z-2 (cyan)    295° → 345°  (upper-right inner)
               CENTRAL (teal) 345° → 15°  (right middle, faces stage)
               Z-3 (purple)   15° → 65°   (lower-right inner)
               Z-4 (yellow)   65° → 115°  (bottom center)
               Z-6 (orange)  115° → 205°  (lower-left + left)
               Z-7 (pink)    outer ring right side 280° → 80°
               Z-5 (green)   inner field ellipse
        ════════════════════════════════════════════════ -->

        <!-- ─── ZONA 1 — Red  205°→295°  (upper-left) ─── -->
        <!-- 205°: outer=(81,315)   inner=(184,378) -->
        <!-- 295°: outer=(519,114)  inner=(471,249) -->
        <g id="zona-Z-1" @click="selectZona('Z-1')" style="cursor:pointer">
          <path :fill="activeZona==='Z-1'?'#dc262640':'#dc262620'"
                :stroke="activeZona==='Z-1'?'#dc2626':'#dc262660'"
                stroke-width="1.5"
                d="M 81 315 A 330 415 0 0 1 519 114 L 471 249 A 216 266 0 0 0 184 378 Z"
                class="transition-all duration-200"/>
          <text x="228" y="218" text-anchor="middle" fill="#fca5a5" font-size="13" font-family="Inter,sans-serif" font-weight="800" pointer-events="none" opacity="0.9">ZONA 1</text>
          <!-- A deg=210 outer-ring --> <g @click.stop="selectSector('Z-1','A')" style="cursor:pointer">
            <circle cx="270" cy="50" r="14" :fill="activeSector==='Z-1|A'?'#dc2626':'#1a0a0a'" :stroke="activeSector==='Z-1|A'?'#fff':'#dc2626'" stroke-width="2.5" class="transition-all duration-150" filter="url(#dot-shadow)"/>
            <text x="270" y="55 " text-anchor="middle" fill="white" font-size="10" font-family="Inter,sans-serif" font-weight="800" pointer-events="none">A</text>
          </g>
          <!-- B deg=232 outer-ring --> <g @click.stop="selectSector('Z-1','B')" style="cursor:pointer">
            <circle cx="320" cy="70" r="14" :fill="activeSector==='Z-1|B'?'#dc2626':'#1a0a0a'" :stroke="activeSector==='Z-1|B'?'#fff':'#dc2626'" stroke-width="2.5" class="transition-all duration-150" filter="url(#dot-shadow)"/>
            <text x="320" y="75" text-anchor="middle" fill="white" font-size="10" font-family="Inter,sans-serif" font-weight="800" pointer-events="none">B</text>
          </g>
          <!-- C — outer margin top --> <g @click.stop="selectSector('Z-1','C')" style="cursor:pointer">
            <circle cx="378" cy="90" r="14" :fill="activeSector==='Z-1|C'?'#dc2626':'#1a0a0a'" :stroke="activeSector==='Z-1|C'?'#fff':'#dc2626'" stroke-width="2.5" class="transition-all duration-150" filter="url(#dot-shadow)"/>
            <text x="378" y="95" text-anchor="middle" fill="white" font-size="10" font-family="Inter,sans-serif" font-weight="800" pointer-events="none">C</text>
          </g>
          <!-- D — old C position --> <g @click.stop="selectSector('Z-1','D')" style="cursor:pointer">
            <circle cx="378" cy="210" r="14" :fill="activeSector==='Z-1|D'?'#dc2626':'#1a0a0a'" :stroke="activeSector==='Z-1|D'?'#fff':'#dc2626'" stroke-width="2.5" class="transition-all duration-150" filter="url(#dot-shadow)"/>
            <text x="378" y="215" text-anchor="middle" fill="white" font-size="10" font-family="Inter,sans-serif" font-weight="800" pointer-events="none">D</text>
          </g>
        </g>

        <!-- ─── ZONA 2 — Cyan  295°→345°  (upper-right) ─── -->

          </g>
          <!-- B deg=314 --> <g @click.stop="selectSector('Z-2','B')" style="cursor:pointer">
            <circle cx="469" cy="244" r="14" :fill="activeSector==='Z-2|B'?'#06b6d4':'#040d14'" :stroke="activeSector==='Z-2|B'?'#fff':'#06b6d4'" stroke-width="2.5" class="transition-all duration-150" filter="url(#dot-shadow)"/>

            <text x="640" y="255" text-anchor="middle" fill="white" font-size="10" font-family="Inter,sans-serif" font-weight="800" pointer-events="none">C</text>

          <!-- D deg=339 --> <g @click.stop="selectSector('Z-2','D')" style="cursor:pointer">
            <circle cx="550" cy="320" r="14" :fill="activeSector==='Z-2|D'?'#06b6d4':'#040d14'" :stroke="activeSector==='Z-2|D'?'#fff':'#06b6d4'" stroke-width="2.5" class="transition-all duration-150" filter="url(#dot-shadow)"/>
            <text x="550" y="325" text-anchor="middle" fill="white" font-size="10" font-family="Inter,sans-serif" font-weight="800" pointer-events="none">D</text>
          </g>
        </g>

        <!-- ─── ZONA CENTRAL — Teal  345°→15°  (full grandstand: rx=216,266 → rx=330,415) ─── -->
        <!-- Same ring width as Z-2 and Z-3 | 345°: outer=(699,383) inner=(589,421) | 15°: outer=(699,597) inner=(589,559) -->
        <g id="zona-CENTRAL" @click="selectZona('CENTRAL')" style="cursor:pointer">
          <path :fill="activeZona==='CENTRAL'?'#14b8a640':'#14b8a620'"
                :stroke="activeZona==='CENTRAL'?'#14b8a6aa':'#14b8a650'"
                stroke-width="1.5"
                d="M 699 383 A 330 415 0 0 1 699 597 L 589 559 A 216 266 0 0 0 589 421 Z"
                class="transition-all duration-200"/>
          <text x="650" y="481" text-anchor="middle" fill="#2dd4bf" font-size="11" font-family="Inter,sans-serif" font-weight="800" pointer-events="none">ZONA</text>
          <text x="650" y="495" text-anchor="middle" fill="#2dd4bf" font-size="11" font-family="Inter,sans-serif" font-weight="800" pointer-events="none">CENTRAL</text>
          <!-- B top-inner --> <g @click.stop="selectSector('CENTRAL','B')" style="cursor:pointer">
            <circle cx="600" cy="428" r="13" :fill="activeSector==='CENTRAL|B'?'#14b8a6':'#040e0d'" :stroke="activeSector==='CENTRAL|B'?'#fff':'#14b8a6'" stroke-width="2.5" class="transition-all duration-150" filter="url(#dot-shadow)"/>
            <text x="600" y="433" text-anchor="middle" fill="white" font-size="10" font-family="Inter,sans-serif" font-weight="800" pointer-events="none">B</text>
          </g>
          <!-- A top-outer --> <g @click.stop="selectSector('CENTRAL','A')" style="cursor:pointer">
            <circle cx="685" cy="400" r="13" :fill="activeSector==='CENTRAL|A'?'#14b8a6':'#040e0d'" :stroke="activeSector==='CENTRAL|A'?'#fff':'#14b8a6'" stroke-width="2.5" class="transition-all duration-150" filter="url(#dot-shadow)"/>
            <text x="685" y="405" text-anchor="middle" fill="white" font-size="10" font-family="Inter,sans-serif" font-weight="800" pointer-events="none">A</text>
          </g>
          <!-- C bottom-inner --> <g @click.stop="selectSector('CENTRAL','C')" style="cursor:pointer">
            <circle cx="595" cy="553" r="13" :fill="activeSector==='CENTRAL|C'?'#14b8a6':'#040e0d'" :stroke="activeSector==='CENTRAL|C'?'#fff':'#14b8a6'" stroke-width="2.5" class="transition-all duration-150" filter="url(#dot-shadow)"/>
            <text x="595" y="558" text-anchor="middle" fill="white" font-size="10" font-family="Inter,sans-serif" font-weight="800" pointer-events="none">C</text>
          </g>
          <!-- D bottom-outer --> <g @click.stop="selectSector('CENTRAL','D')" style="cursor:pointer">
            <circle cx="690" cy="575" r="13" :fill="activeSector==='CENTRAL|D'?'#14b8a6':'#040e0d'" :stroke="activeSector==='CENTRAL|D'?'#fff':'#14b8a6'" stroke-width="2.5" class="transition-all duration-150" filter="url(#dot-shadow)"/>
            <text x="690" y="580" text-anchor="middle" fill="white" font-size="10" font-family="Inter,sans-serif" font-weight="800" pointer-events="none">D</text>
          </g>
        </g>

        <!-- ─── ZONA 3 — Purple  15°→65°  (lower-right) ─── -->
        <!-- 15°:  outer=(699,597)  inner=(589,559) -->
        <!-- 65°:  outer=(519,866)  inner=(471,731) -->
        <g id="zona-Z-3" @click="selectZona('Z-3')" style="cursor:pointer">
          <path :fill="activeZona==='Z-3'?'#8b5cf640':'#8b5cf620'"
                :stroke="activeZona==='Z-3'?'#8b5cf6':'#8b5cf660'"
                stroke-width="1.5"
                d="M 699 597 A 330 415 0 0 1 519 866 L 471 731 A 216 266 0 0 0 589 559 Z"
                class="transition-all duration-200"/>
          <text x="634" y="650" text-anchor="middle" fill="#c4b5fd" font-size="13" font-family="Inter,sans-serif" font-weight="800" pointer-events="none" opacity="0.9">ZONA 3</text>
          <!-- A deg=34 --> <g @click.stop="selectSector('Z-3','A')" style="cursor:pointer">
            <circle cx="530" cy="845" r="14" :fill="activeSector==='Z-3|A'?'#8b5cf6':'#0d0814'" :stroke="activeSector==='Z-3|A'?'#fff':'#8b5cf6'" stroke-width="2.5" class="transition-all duration-150" filter="url(#dot-shadow)"/>
            <text x="530" y="850" text-anchor="middle" fill="white" font-size="10" font-family="Inter,sans-serif" font-weight="800" pointer-events="none">A</text>
          </g>
          <!-- B deg=21 --> <g @click.stop="selectSector('Z-3','B')" style="cursor:pointer">
            <circle cx="490" cy="735" r="14" :fill="activeSector==='Z-3|B'?'#8b5cf6':'#0d0814'" :stroke="activeSector==='Z-3|B'?'#fff':'#8b5cf6'" stroke-width="2.5" class="transition-all duration-150" filter="url(#dot-shadow)"/>
            <text x="490" y="740" text-anchor="middle" fill="white" font-size="10" font-family="Inter,sans-serif" font-weight="800" pointer-events="none">B</text>
          </g>
          <!-- C deg=46 --> <g @click.stop="selectSector('Z-3','C')" style="cursor:pointer">
            <circle cx="645" cy="726" r="14" :fill="activeSector==='Z-3|C'?'#8b5cf6':'#0d0814'" :stroke="activeSector==='Z-3|C'?'#fff':'#8b5cf6'" stroke-width="2.5" class="transition-all duration-150" filter="url(#dot-shadow)"/>
            <text x="645" y="731" text-anchor="middle" fill="white" font-size="10" font-family="Inter,sans-serif" font-weight="800" pointer-events="none">C</text>
          </g>
          <!-- D deg=59 --> <g @click.stop="selectSector('Z-3','D')" style="cursor:pointer">
            <circle cx="550" cy="661" r="14" :fill="activeSector==='Z-3|D'?'#8b5cf6':'#0d0814'" :stroke="activeSector==='Z-3|D'?'#fff':'#8b5cf6'" stroke-width="2.5" class="transition-all duration-150" filter="url(#dot-shadow)"/>
            <text x="550" y="666" text-anchor="middle" fill="white" font-size="10" font-family="Inter,sans-serif" font-weight="800" pointer-events="none">D</text>
          </g>
        </g>

        <!-- ─── ZONA 4 — Yellow  65°→115°  (bottom center) ─── -->
        <!-- 65°:  outer=(519,866)  inner=(471,731) -->
        <!-- 115°: outer=(241,866)  inner=(289,731) -->
        <g id="zona-Z-4" @click="selectZona('Z-4')" style="cursor:pointer">
          <path :fill="activeZona==='Z-4'?'#eab30840':'#eab30820'"
                :stroke="activeZona==='Z-4'?'#eab308':'#eab30860'"
                stroke-width="1.5"
                d="M 519 866 A 330 415 0 0 1 241 866 L 289 731 A 216 266 0 0 0 471 731 Z"

          <text x="380" y="830" text-anchor="middle" fill="#fde047" font-size="13" font-family="Inter,sans-serif" font-weight="800" pointer-events="none" opacity="0.9">ZONA 4</text>

          <!-- C deg=96 --> <g @click.stop="selectSector('Z-4','C')" style="cursor:pointer">

        <!-- ─── ZONA 6 — Orange  115°→205°  (lower-left + left) ─── -->

        <g id="zona-Z-6" @click="selectZona('Z-6')" style="cursor:pointer">

        <!-- ─── ZONA 7 — Pink  345°→15°  (outer ring BEHIND Central: rx=330,415 → rx=430,530) ─── -->
        <!-- 345°: outer=(795,353) inner=(699,383) | 15°: outer=(795,627) inner=(699,597) -->
        <g id="zona-Z-7" @click="selectZona('Z-7')" style="cursor:pointer">
          <path :fill="activeZona==='Z-7'?'#ec489940':'#ec489920'"
                :stroke="activeZona==='Z-7'?'#ec4899':'#ec489960'"
                stroke-width="1.5"
                d="M 795 353 A 430 530 0 0 1 795 627 L 699 597 A 330 415 0 0 0 699 383 Z"

<script>
function mapaPage() {
  return {
    activeZona: null,
    activeSector: null,      // format: "Z-1|A"
    activeBloqueFilter: '',

    zonaColors: {
      'Z-1':     '#dc2626',
      'Z-2':     '#06b6d4',
      'Z-3':     '#8b5cf6',
      'Z-4':     '#eab308',
      'Z-5':     '#22c55e',
      'Z-6':     '#f97316',
      'Z-7':     '#ec4899',
      'CENTRAL': '#14b8a6',
    },

    zonasList: [
      { id: 'Z-1',     label: 'Zona 1',     color: '#dc2626' },
      { id: 'Z-2',     label: 'Zona 2',     color: '#06b6d4' },
      { id: 'Z-3',     label: 'Zona 3',     color: '#8b5cf6' },
      { id: 'Z-4',     label: 'Zona 4',     color: '#eab308' },
      { id: 'Z-5',     label: 'Zona 5',     color: '#22c55e' },
      { id: 'Z-6',     label: 'Zona 6',     color: '#f97316' },
      { id: 'Z-7',     label: 'Zona 7',     color: '#ec4899' },
      { id: 'CENTRAL', label: 'Zona Central', color: '#14b8a6' },
    ],

    init() {
      // Build a map from zona id_zona -> zona doc id for matching
      this._zonaIdMap = {};
      (_ZONAS_DATA || []).forEach(z => {
        const key = (z.id_zona || z.id || '').toUpperCase();
        this._zonaIdMap[key] = z.id;
        // also map by doc id
        this._zonaIdMap[(z.id || '').toUpperCase()] = z.id;
      });
    },

    // Resolve zona_id from asignacion to our internal key (Z-1, Z-2, etc.)
    _resolveZonaKey(zonaDocId) {
      if (!zonaDocId) return null;
      const z = (_ZONAS_DATA || []).find(z => z.id === zonaDocId);
      if (!z) return null;
      const idZona = (z.id_zona || z.id || '').toUpperCase();
      // normalize: "Z1" -> "Z-1", "Z-C" -> "CENTRAL", etc.
      if (/^Z\d+$/.test(idZona)) return 'Z-' + idZona.slice(1);
      if (idZona === 'Z-C') return 'CENTRAL';
      return idZona;
    },

    selectZona(zonaKey) {
      if (this.activeZona === zonaKey && !this.activeSector) {
        this.clearSelection();
        return;
      }
      this.activeZona = zonaKey;
      this.activeSector = null;
      this.activeBloqueFilter = '';
    },

    selectSector(zonaKey, sector) {
      const key = zonaKey + '|' + sector;
      if (this.activeSector === key) {
        this.activeSector = null;
        return;
      }
      this.activeZona = zonaKey;
      this.activeSector = key;
      this.activeBloqueFilter = '';
    },

    clearSelection() {
      this.activeZona = null;
      this.activeSector = null;
      this.activeBloqueFilter = '';
    },

    get currentColor() {
      return this.zonaColors[this.activeZona] || '#06b6d4';
    },

    get panelTitle() {
      if (this.activeSector) {
        const [zona, sector] = this.activeSector.split('|');
        const zLabel = this.zonasList.find(z => z.id === zona)?.label || zona;
        return `${zLabel} — Sector ${sector}`;
      }
      return this.zonasList.find(z => z.id === this.activeZona)?.label || this.activeZona;
    },

    get panelAsigs() {
      if (!this.activeZona) return [];
      return (_ASIGNACIONES || []).filter(a => {
        const zonaKey = this._resolveZonaKey(a.zona_id);
        if (zonaKey !== this.activeZona) return false;
        if (this.activeSector) {
          const expectedSector = this.activeSector.split('|')[1];
          return (a.sub_sector || '').toUpperCase() === expectedSector.toUpperCase();
        }
        return true;
      });
    },

    get filteredAsigs() {
      const toMin = s => { const [h,m] = (s||'').split(':').map(Number); return (h||0)*60+(m||0); };
      const list = !this.activeBloqueFilter
        ? this.panelAsigs
        : this.panelAsigs.filter(a => a.bloque_maestro === this.activeBloqueFilter);
      return [...list].sort((a,b) => toMin(a.horario?.inicio) - toMin(b.horario?.inicio));
    },

    get uniqueVols() {
      return new Set(this.panelAsigs.map(a => a.voluntario_id)).size;
    },

    get bloques() {
      const set = new Set();
      this.panelAsigs.forEach(a => { if (a.bloque_maestro) set.add(a.bloque_maestro); });
      return [...set].sort((a, b) => {
        const toMin = s => { const [h,m] = (s.split('-')[0] || s).trim().split(':').map(Number); return h*60+(m||0); };
        return toMin(a) - toMin(b);
      });
    },

    sendWhatsApp(a) {
      const nombre  = a.voluntario_nombre || '—';
      const cong    = a.congregacion_nombre || '—';
      const zonaId  = a.zona_id_zona || a.zona_id || '?';
      const sector  = a.sub_sector || '?';
      const zonaNom = a.zona_nombre || '—';
      const inicio  = a.horario?.inicio || '?';
      const fin     = a.horario?.fin || '?';
      const cel     = (a.celular || '').replace(/\D/g, '');

      const turnoMap = {
        '07:30': { '12:30': '1er turno', '10:00': '1er turno', '08:45': '1er turno' },
        '08:45': { '10:00': '2do turno' },
        '10:00': { '12:30': '2do turno', '11:15': '3er turno' },
        '11:15': { '12:30': '4to turno' },
        '12:30': { '17:00': '2do turno', '15:00': '3er turno' },
        '15:00': { '17:00': '4to turno' },
      };
      const turno = (turnoMap[inicio] && turnoMap[inicio][fin]) || a.bloque_maestro || '—';

      const msg =
`*Recordatorio de Asignación — Asamblea de Circuito*
_"Tienen que adorarlo con espíritu y con verdad"_
14 de marzo de 2026

Estimado hermano ${nombre}:

Reciba un cordial saludo. Por medio del presente mensaje deseamos recordarle su asignación en el Departamento de Acomodadores para la próxima Asamblea de Circuito.

- *Congregación:* ${cong}
- *Sector asignado:* ${zonaId}: ${sector} — ${zonaNom}
- *Turno:* ${turno}
- *Día:* Sábado
- *Horario:* ${inicio} – ${fin}

Agradecemos su disposición para colaborar y le solicitamos por favor ser puntual, debido a la asistencia que se espera.

Quedamos muy agradecidos por su apoyo y rogamos que Jehová continúe bendiciendo su servicio a favor de los intereses del Reino.

Con aprecio cristiano,

_Departamento de Acomodadores_
_Asamblea de Circuito_`;

      const url = cel
        ? `https://wa.me/${cel}?text=${encodeURIComponent(msg)}`
        : `https://wa.me/?text=${encodeURIComponent(msg)}`;
      window.open(url, '_blank');
    },
  };
}
